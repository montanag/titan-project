services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan
      POSTGRES_DB: titan
    ports:
      - "5433:5432"
    volumes:
      - titan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan -d titan"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  titan_pgdata:
